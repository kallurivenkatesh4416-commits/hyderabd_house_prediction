<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hyderabad Property Price Predictor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M3 11.4 12 4l9 7.4v8.1a1.5 1.5 0 0 1-1.5 1.5H15v-6H9v6H4.5A1.5 1.5 0 0 1 3 19.5v-8.1Z" />
            </svg>
          </span>
          <div>
            <h1>Hyderabad Property Price Predictor</h1>
            <p id="datasetLine">Loading market data</p>
          </div>
        </div>
        <div class="model-chip">
          <span class="pulse" aria-hidden="true"></span>
          Ridge model
        </div>
      </header>

      <main class="workspace">
        <section class="input-panel" aria-labelledby="formTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Property inputs</p>
              <h2 id="formTitle">Estimate price</h2>
            </div>
            <img src="/static/hyderabad-map.svg" class="city-art" alt="" />
          </div>

          <form id="predictionForm" class="prediction-form">
            <label class="field wide">
              <span>Location</span>
              <select id="location" name="location" required></select>
            </label>

            <label class="field">
              <span>Building status</span>
              <select id="building_status" name="building_status" required></select>
            </label>

            <label class="field">
              <span>Property type</span>
              <select id="property_type" name="property_type" required></select>
            </label>

            <label class="field">
              <span>BHK</span>
              <select id="bhk" name="bhk" required></select>
            </label>

            <label class="field">
              <span>Area in sqft</span>
              <input id="area_insqft" name="area_insqft" type="number" min="1" step="1" required />
            </label>

            <button class="predict-button" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14" />
                <path d="m13 6 6 6-6 6" />
              </svg>
              Predict price
            </button>
          </form>
        </section>

        <section class="result-panel" aria-live="polite">
          <p class="eyebrow">Model prediction</p>
          <div id="priceResult" class="price-result">₹ --</div>
          <div id="priceSubline" class="price-subline">Choose property details</div>

          <div class="metric-grid">
            <div class="metric">
              <span>Area</span>
              <strong id="areaMetric">-- sqft</strong>
            </div>
            <div class="metric">
              <span>BHK</span>
              <strong id="bhkMetric">--</strong>
            </div>
            <div class="metric">
              <span>Status</span>
              <strong id="statusMetric">--</strong>
            </div>
            <div class="metric">
              <span>Type</span>
              <strong id="typeMetric">--</strong>
            </div>
          </div>

          <div class="market-strip">
            <div>
              <span>Median price</span>
              <strong id="medianPrice">--</strong>
            </div>
            <div>
              <span>Median area</span>
              <strong id="medianArea">--</strong>
            </div>
          </div>
        </section>

        <section class="locations-panel" aria-labelledby="locationsTitle">
          <div class="panel-heading compact">
            <div>
              <p class="eyebrow">Market sample</p>
              <h2 id="locationsTitle">Popular locations</h2>
            </div>
          </div>
          <div id="popularLocations" class="location-list"></div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
